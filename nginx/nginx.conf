# Nginx kitne worker processes run karega
# Usually = CPU cores, but 1 bhi small server ke liye ok hai
worker_processes 1;

events {
    # Har worker ek time me kitni connections handle kar sakta hai
    # Total connections ≈ worker_processes × worker_connections
    worker_connections 1024;
}

http {

    # Gzip compression ON → response size kam hota hai → faster loading
    gzip on;

    # Proxy ke through aayi requests par bhi gzip apply karo
    gzip_proxied any;

    # Kin content types par compression apply hoga
    gzip_types text/plain application/json;

    # Sirf 1000 bytes se bade response par hi gzip lagega
    gzip_min_length 1000;


    # WebSocket / HTTP upgrade handling ke liye mapping
    # Agar client upgrade request bheje → upgrade
    # warna → normal close
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }


    # Upstream = backend servers ka group
    # 'simply' sirf ek alias name hai (kuch bhi rakh sakte ho)
    upstream simply {
        # Docker service name + port
        # Ye Django (Gunicorn) container ko point karta hai
        server web_app:8000;
    }


    server {
        # Nginx kis port pe listen karega (public entry point)
        listen 80;

        # Domain name jisme request accept hogi
        server_name begining.fun www.begining.fun;


        location / {

            # Incoming request ko upstream (Django container) ko forward karo
            proxy_pass http://simply;


            # Original request ka host forward karo (important for Django)
            proxy_set_header Host $host;

            # Client ka real IP backend ko pass karo
            proxy_set_header X-Real-IP $remote_addr;

            # Agar multiple proxies hain to full chain of IPs
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # HTTP ya HTTPS ka info pass karega
            proxy_set_header X-Forwarded-Proto $scheme;


            # HTTP/1.1 use karo (required for keep-alive & websockets)
            proxy_http_version 1.1;

            # WebSocket upgrade header
            proxy_set_header Upgrade $http_upgrade;

            # Connection ko dynamically upgrade ya close karo
            proxy_set_header Connection $connection_upgrade;


            # WebSocket request caching avoid karo
            proxy_cache_bypass $http_upgrade;


            # Backend se response ke liye max wait time (seconds)
            proxy_read_timeout 300;

            # Backend se connect hone ka max time
            proxy_connect_timeout 300;

            # Response bhejne ka max time
            proxy_send_timeout 300;
        }
    }
}